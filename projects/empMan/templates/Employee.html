<!DOCTTYPE>
<html>
<body>
<h1>Employee data </h1>

{% if employees %}
<table>
 <thead>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Salary</th>
    <th>Email</th>
 </thead>
 
    {% for emp in employees %}
    <tr>
    <td>{{ emp.firstname }}</td>
    <td>{{ emp.lastname }}</td>
    <td>{{ emp.salary }}</td>
    <td>{{ emp.email }}</td>
    </tr>
    {% endfor %}
 


</table>

{% else %}

<p> no employee data found </p>

{% endif %}
</body>

</html>
